

<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script
        src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
    <script
        src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs>
        <a-marker preset="hiro" id="hiro-marker">
            <a-entity gltf-model="url(assets/leopard_animation_run.glb)" scale="0.02 0.02 0.02" position="0 0 0"
                rotation="90 -90 90" animation-mixer="loop: repeat; crossFadeDuration: 1">
            </a-entity>

            <a-entity gltf-model="url(assets/animated_dragon_three_motion_loops.glb)" scale="0.9 0.9 0.9"
                position="3.7 -3 0" rotation="20 280 90"
                animation-mixer="loop: repeat; crossFadeDuration: 1; timeScale: 1.5;">
            </a-entity>

            <a-entity position="10 15 0" rotation="20 280 90">
                <a-entity gltf-model="url(assets/lightning_flash_propagation.glb)" scale="3 3 3"
                    animation-mixer="clip: lightning; loop: repeat; timeScale: 1.5;">
                </a-entity>
            </a-entity>


            <a-sound id="audio_project" src="url(assets/dragon-roar-87519.mp3)" autoplay="false" loop="true"
                volume="1.0"></a-sound>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>



    <script>
        var marker = document.querySelector('#hiro-marker');
        var sound = document.querySelector('#audio_project');

        marker.addEventListener('markerFound', function () {
            sound.components.sound.playSound();
        });

        marker.addEventListener('markerLost', function () {
            sound.components.sound.stopSound();
        });
    </script>
</body>

</html>
