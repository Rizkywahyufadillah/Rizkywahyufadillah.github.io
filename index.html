<!DOCTYPE html>
<html>

<head>
    <title>AR Birthday Greetings - Choose Your Experience</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            text-align: center;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            padding: 12px 25px;
            background-color: #FF69B4;
            /* Pink */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #FF1493;
            /* Deeper Pink */
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to AR Birthday Greetings!</h1>
        <p>Choose an Augmented Reality experience to send a special birthday wish.</p>
        <a href="birthday-surprise.html" class="button">Launch Birthday Surprise AR</a>
    </div>
</body>

</html>
