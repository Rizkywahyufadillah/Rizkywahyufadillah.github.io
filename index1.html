<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <style>
        .birthday-message {
            background-color: rgba(255, 105, 180, 0.7);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            margin: 0 auto;
        }

        .next-button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        .next-button:hover {
            background-color: #ff1493;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs renderer="logarithmicDepthBuffer: true;">
        <!-- Marker -->
        <a-marker preset="hiro" id="hiro-marker">
            Model Kotak Kado
            <a-entity id="kotakKado1" class="clickable" gltf-model="url(assets1/kotak_kado1.glb)" scale="0.05 0.05 0.05"
                position="0 0.5 0" rotation="90 -90 90" animation-mixer>
            </a-entity>

            <!-- Hitbox -->
            <a-box id="kotakKado1-hitbox" position="0 0.5 0" width="1" height="1" depth="1" color="red"
                material="opacity: 0.001;" class="clickable">
            </a-box>

            <!-- Birthday Messages (initially hidden) -->

        </a-marker>

        <!-- Kamera dan Raycaster -->
        <a-entity camera raycaster="objects: .clickable; far: 20; interval: 100" cursor="rayOrigin: mouse">
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hitbox = document.querySelector('#kotakKado1-hitbox');
            let clicked = false;

            hitbox.addEventListener('click', () => {


                window.location.href = 'ucapan1.html';

            });
        });
    </script>
</body>

</html>
