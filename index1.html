<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs renderer="logarithmicDepthBuffer: true;">
        <!-- Marker -->
        <a-marker preset="hiro" id="hiro-marker">
            <!-- Model Kotak Kado -->
            <a-entity id="kotakKado1" class="clickable" gltf-model="url(assets1/kotak_kado1.glb)" scale="0.05 0.05 0.05"
                position="0 0.5 0" rotation="90 -90 90" animation-mixer>
            </a-entity>

            <!-- Hitbox (besar dan transparan, mengikuti ukuran model) -->
            <a-box id="kotakKado1-hitbox" position="0 0.5 0" width="1" height="1" depth="1" color="red"
                material="opacity: 0.001; transparent: true" class="clickable">
            </a-box>

            <!-- Teks ucapan (awalnya tidak terlihat) -->
            <a-text id="ucapan-text" value="" position="0 1.5 0" align="center" color="white" visible="false"
                scale="1.5 1.5 1.5">
            </a-text>
        </a-marker>

        <!-- Kamera dan Raycaster -->
        <a-entity camera raycaster="objects: .clickable; far: 20; interval: 100" cursor="rayOrigin: mouse">
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hitbox = document.querySelector('#kotakKado1-hitbox');
            const ucapanText = document.querySelector('#ucapan-text');
            let clicked = false;

            hitbox.addEventListener('click', () => {
                console.log('Hitbox kotakKado1 diklik!');

                if (!clicked) {
                    clicked = true;
                    ucapanText.setAttribute('value', 'Selamat Ulang Tahun!');
                    ucapanText.setAttribute('visible', 'true');
                } else {
                    window.location.href = 'ucapan1.html';
                }
            });
        });
    </script>
</body>

</html>
