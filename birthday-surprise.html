<!DOCTYPE html>
<html>

<head>
    <title>AR Birthday Surprise</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script
        src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
    <script
        src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
    <style>
        /* Optional: Add some basic styling for better UX on AR page */
        body {
            margin: 0;
            overflow: hidden;
        }

        #ar-overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 0.9em;
            z-index: 100;
        }

        #back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #FF69B4;
            /* Pink */
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 1.1em;
            z-index: 101;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div id="ar-overlay">
        Scan the HIRO marker to see the birthday surprise!
    </div>
    <a href="index.html" id="back-button">Back to Main Page</a>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="giftBoxModel" src="assets/gift_box.glb"></a-asset-item>
            <a-asset-item id="birthdayCakeModel" src="assets/birthday_cake.glb"></a-asset-item>

            <audio id="happyBirthdaySound" src="assets/happy_birthday_sound.mp3" preload="auto"></audio>
            <audio id="unwrapSound" src="assets/unwrap_sound.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker preset="hiro" id="birthday-marker">
            <a-entity id="gift-entity" gltf-model="#giftBoxModel" scale="0.05 0.05 0.05" position="0 0.5 0"
                rotation="0 45 0" animation="property: rotation; to: 0 405 0; loop: true; dur: 8000; easing: linear;"
                class="clickable" visible="true">
            </a-entity>

            <a-entity id="cake-entity" gltf-model="#birthdayCakeModel" scale="0.03 0.03 0.03" position="0 0.2 0"
                rotation="0 0 0" visible="false">
                <a-animation attribute="scale" begin="showCake" from="0 0 0" to="0.03 0.03 0.03" dur="1000"
                    fill="forwards"></a-animation>
            </a-entity>

            <a-text id="birthday-text" value="Selamat Ulang Tahun!" align="center" width="2" position="0 1.2 0"
                rotation="-90 0 0" color="#FFC0CB" visible="false">
                <a-animation attribute="scale" begin="showText" from="0 0 0" to="1 1 1" dur="1000"
                    fill="forwards"></a-animation>
            </a-text>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const giftEntity = document.querySelector('#gift-entity');
            const cakeEntity = document.querySelector('#cake-entity');
            const birthdayText = document.querySelector('#birthday-text');
            const happyBirthdaySound = document.querySelector('#happyBirthdaySound');
            const unwrapSound = document.querySelector('#unwrapSound');

            // Komponen untuk menangani klik pada entitas A-Frame
            AFRAME.registerComponent('clickable', {
                init: function () {
                    this.el.addEventListener('click', () => {
                        this.el.emit('clicked'); // Emit event 'clicked' saat entitas diklik
                    });
                }
            });

            // Logika interaksi saat kado diklik
            giftEntity.addEventListener('clicked', function () {
                console.log('Gift box clicked!');

                if (unwrapSound) {
                    unwrapSound.play();
                }

                this.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 500; fill: forwards;');
                setTimeout(() => {
                    this.setAttribute('visible', 'false');
                }, 500);

                setTimeout(() => {
                    if (cakeEntity) {
                        cakeEntity.setAttribute('visible', 'true');
                        cakeEntity.emit('showCake');
                    }
                    if (birthdayText) {
                        birthdayText.setAttribute('visible', 'true');
                        birthdayText.emit('showText');
                    }

                    if (happyBirthdaySound) {
                        happyBirthdaySound.play();
                    }
                }, 700);
            });

            // Logika marker found/lost
            const marker = document.querySelector('#birthday-marker');
            marker.addEventListener('markerFound', function () {
                console.log('Marker found, AR experience active!');
                // Reset state saat marker ditemukan kembali
                if (giftEntity) {
                    giftEntity.setAttribute('visible', 'true');
                    giftEntity.setAttribute('scale', '0.05 0.05 0.05');
                    giftEntity.setAttribute('animation', 'property: rotation; to: 0 405 0; loop: true; dur: 8000; easing: linear;');
                }
                if (cakeEntity) {
                    cakeEntity.setAttribute('visible', 'false');
                    cakeEntity.setAttribute('scale', '0 0 0');
                }
                if (birthdayText) {
                    birthdayText.setAttribute('visible', 'false');
                    birthdayText.setAttribute('scale', '0 0 0');
                }
            });

            marker.addEventListener('markerLost', function () {
                console.log('Marker lost, AR experience paused.');
                // Berhentikan suara jika marker hilang
                if (happyBirthdaySound) {
                    happyBirthdaySound.pause();
                    happyBirthdaySound.currentTime = 0;
                }
                if (unwrapSound) {
                    unwrapSound.pause();
                    unwrapSound.currentTime = 0;
                }
            });
        });
    </script>
</body>

</html>
