<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs cursor="rayOrigin: mouse" raycaster="objects: .clickable">

        <!-- Marker -->
        <a-marker preset="hiro">

            <!-- Model Leopard -->
            <a-entity id="leopard-model" gltf-model="url(assets/leopard_animation_run.glb)" scale="0.05 0.05 0.05"
                position="0 0.5 0" rotation="90 -90 90" animation-mixer>
            </a-entity>

            <!-- Hitbox transparan (posisi sama seperti leopard) -->
            <a-box id="leopard-hitbox" position="0 1 0" width="1" height="2" depth="1"
                material="opacity: 0; transparent: true" class="clickable">
            </a-box>

            <!-- Teks ucapan -->
            <a-text id="ucapan-text" value="" position="0 2 0" align="center" color="yellow" width="4" visible="false">
            </a-text>

        </a-marker>

        <!-- Kamera -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hitbox = document.querySelector('#leopard-hitbox');
            const ucapanText = document.querySelector('#ucapan-text');
            let clicked = false;

            hitbox.addEventListener('click', () => {
                console.log('Hitbox leopard diklik!');

                if (!clicked) {
                    clicked = true;
                    ucapanText.setAttribute('value', 'Selamat Ulang Tahun!');
                    ucapanText.setAttribute('visible', 'true');
                } else {
                    window.location.href = 'ucapan1.html';
                }
            });
        });
    </script>
</body>

</html>
